<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="favicon.ico">
    <title>Obras em Andamento</title>
    <link rel="stylesheet" href="styles.css">
    
</head>
<body>
    <!-- Página de Login -->

    <div id="login-page" class="auth-container">
        <div class="auth-form">
            <h2>Login</h2>
            <div id="login-message"></div>
            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="login-password">Senha</label>
                    <input type="password" id="login-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-block">Entrar</button>
            </form>
            <div class="auth-link">
                <a href="#" id="go-to-register">Não tem uma conta? Cadastre-se</a>
            </div>
        </div>
    </div>

    <!-- Página de Cadastro -->
    <div id="register-page" class="auth-container" style="display: none;">
        <div class="auth-form">
            <h2>Cadastro</h2>
            <div id="register-message"></div>
            <form id="register-form">
                <div class="form-group">
                    <label for="register-name">Nome</label>
                    <input type="text" id="register-name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="register-email">E-mail</label>
                    <input type="email" id="register-email" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="register-password">Senha</label>
                    <input type="password" id="register-password" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="register-confirm-password">Confirmar Senha</label>
                    <input type="password" id="register-confirm-password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-block">Cadastrar</button>
            </form>
            <div class="auth-link">
                <a href="#" id="go-to-login">Já tem uma conta? Faça login</a>
            </div>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" style="display: none;">
        <header>
            <div class="container">
                <div class="navbar">
                    <div class="logo">Obras.com</div>
                    <div class="user-info">
                        <span id="user-name"></span>
                        <button id="logout-btn" class="btn btn-danger">Sair</button>
                    </div>
                </div>
            </div>
        </header>

        <main class="dashboard">
            <div class="container">
                <div class="dashboard-header">
                    <h1 class="dashboard-title">Minhas Obras</h1>
                    <button id="add-work-btn" class="btn btn-success">Adicionar Obra</button>
                </div>

                <div id="works-container" class="works-grid">
                    <!-- As obras serão carregadas aqui dinamicamente -->
                </div>
            </div>
        </main>
    </div>

    <!-- Modal para Adicionar/Editar Obra -->
    <div id="work-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modal-title">Adicionar Obra</h2>
                <button class="close-modal">&times;</button>
            </div>
            <form id="work-form">
                <input type="hidden" id="work-id">
                <div class="form-group">
                    <label for="work-title">Título da Obra</label>
                    <input type="text" id="work-title" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="work-description">Descrição</label>
                    <textarea id="work-description" class="form-control" rows="3"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="work-location">Localização</label>
                        <input type="text" id="work-location" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="work-budget">Orçamento (R$)</label>
                        <input type="number" id="work-budget" class="form-control" min="0" step="0.01">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="work-start-date">Data de Início</label>
                        <input type="date" id="work-start-date" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label for="work-end-date">Data de Término Prevista</label>
                        <input type="date" id="work-end-date" class="form-control">
                    </div>
                </div>
                <div class="form-group">
                    <label for="work-status">Status</label>
                    <select id="work-status" class="form-control" required>
                        <option value="planned">Planejada</option>
                        <option value="in-progress">Em Andamento</option>
                        <option value="completed">Concluída</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-success btn-block">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
